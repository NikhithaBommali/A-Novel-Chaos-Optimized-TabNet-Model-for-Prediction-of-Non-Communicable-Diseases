<svg width="1600" height="980" viewBox="0 0 1600 980" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="980" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFBF5"/>
      <stop offset="1" stop-color="#F5F3FF"/>
    </linearGradient>
    <linearGradient id="head" x1="0" y1="0" x2="1600" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#EA580C"/>
      <stop offset="1" stop-color="#7C3AED"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#0F172A" flood-opacity="0.10"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0 0L12 6L0 12V0Z" fill="#475569"/>
    </marker>
    <style>
      .title { font: 700 34px 'Inter', 'Segoe UI', sans-serif; fill: #FFFFFF; }
      .subtitle { font: 500 16px 'Inter', 'Segoe UI', sans-serif; fill: #FFEDD5; }
      .stepNo { font: 700 20px 'Inter', 'Segoe UI', sans-serif; fill: #FFFFFF; }
      .stepTitle { font: 700 18px 'Inter', 'Segoe UI', sans-serif; fill: #0F172A; }
      .stepText { font: 500 14px 'Inter', 'Segoe UI', sans-serif; fill: #334155; }
      .small { font: 600 13px 'Inter', 'Segoe UI', sans-serif; fill: #475569; }
    </style>
  </defs>

  <rect width="1600" height="980" rx="28" fill="url(#bg)"/>
  <rect x="32" y="28" width="1536" height="110" rx="24" fill="url(#head)"/>
  <text x="70" y="80" class="title">Project Methodology</text>
  <text x="70" y="110" class="subtitle">Simple end-to-end flow of how the current project works</text>

  <rect x="70" y="180" width="1460" height="280" rx="28" fill="#FFFFFF" stroke="#E2E8F0"/>

  <rect x="100" y="230" width="200" height="150" rx="24" fill="#DBEAFE" stroke="#60A5FA" stroke-width="2" filter="url(#shadow)"/>
  <circle cx="145" cy="278" r="22" fill="#2563EB"/>
  <text x="138" y="285" class="stepNo">1</text>
  <text x="175" y="275" class="stepTitle">Login / Signup</text>
  <text x="125" y="320" class="stepText">Admin or user</text>
  <text x="125" y="344" class="stepText">enters the system</text>

  <rect x="380" y="230" width="200" height="150" rx="24" fill="#EDE9FE" stroke="#A78BFA" stroke-width="2" filter="url(#shadow)"/>
  <circle cx="425" cy="278" r="22" fill="#7C3AED"/>
  <text x="418" y="285" class="stepNo">2</text>
  <text x="455" y="275" class="stepTitle">Upload Dataset</text>
  <text x="405" y="320" class="stepText">Admin uploads</text>
  <text x="405" y="344" class="stepText">a disease CSV</text>

  <rect x="660" y="230" width="200" height="150" rx="24" fill="#D1FAE5" stroke="#10B981" stroke-width="2" filter="url(#shadow)"/>
  <circle cx="705" cy="278" r="22" fill="#059669"/>
  <text x="698" y="285" class="stepNo">3</text>
  <text x="735" y="275" class="stepTitle">Process Data</text>
  <text x="685" y="320" class="stepText">Store rows,</text>
  <text x="685" y="344" class="stepText">metadata, chunks</text>

  <rect x="940" y="230" width="200" height="150" rx="24" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2" filter="url(#shadow)"/>
  <circle cx="985" cy="278" r="22" fill="#D97706"/>
  <text x="978" y="285" class="stepNo">4</text>
  <text x="1015" y="275" class="stepTitle">Train Model</text>
  <text x="965" y="320" class="stepText">Preprocessor,</text>
  <text x="965" y="344" class="stepText">chaos, TabNet</text>

  <rect x="1220" y="230" width="220" height="150" rx="24" fill="#FCE7F3" stroke="#EC4899" stroke-width="2" filter="url(#shadow)"/>
  <circle cx="1265" cy="278" r="22" fill="#DB2777"/>
  <text x="1258" y="285" class="stepNo">5</text>
  <text x="1295" y="275" class="stepTitle">Serve Prediction</text>
  <text x="1245" y="320" class="stepText">User gets result</text>
  <text x="1245" y="344" class="stepText">from form or chat</text>

  <path d="M300 305H380" stroke="#475569" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M580 305H660" stroke="#475569" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M860 305H940" stroke="#475569" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M1140 305H1220" stroke="#475569" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="120" y="530" width="1360" height="280" rx="28" fill="#FFFFFF" stroke="#E2E8F0"/>
  <text x="160" y="585" style="font:700 22px 'Inter','Segoe UI',sans-serif; fill:#0F172A;">Prediction Runtime Flow</text>

  <rect x="170" y="635" width="200" height="90" rx="20" fill="#DBEAFE" stroke="#60A5FA" stroke-width="2"/>
  <text x="195" y="670" class="stepTitle">User selects method</text>
  <text x="195" y="696" class="stepText">Form or chat</text>

  <rect x="430" y="635" width="200" height="90" rx="20" fill="#EDE9FE" stroke="#A78BFA" stroke-width="2"/>
  <text x="455" y="670" class="stepTitle">API receives input</text>
  <text x="455" y="696" class="stepText">Features or answers</text>

  <rect x="690" y="635" width="200" height="90" rx="20" fill="#D1FAE5" stroke="#10B981" stroke-width="2"/>
  <text x="715" y="670" class="stepTitle">Choose logic</text>
  <text x="715" y="696" class="stepText">Model or rule path</text>

  <rect x="950" y="635" width="200" height="90" rx="20" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2"/>
  <text x="975" y="670" class="stepTitle">Generate result</text>
  <text x="975" y="696" class="stepText">Risk score / level</text>

  <rect x="1210" y="635" width="180" height="90" rx="20" fill="#FCE7F3" stroke="#EC4899" stroke-width="2"/>
  <text x="1235" y="670" class="stepTitle">Show in dashboard</text>
  <text x="1235" y="696" class="stepText">Results and charts</text>

  <path d="M370 680H430" stroke="#475569" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M630 680H690" stroke="#475569" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M890 680H950" stroke="#475569" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M1150 680H1210" stroke="#475569" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="240" y="860" width="1120" height="40" rx="14" fill="#FFF7ED" stroke="#FDBA74"/>
  <text x="275" y="885" class="small">Short methodology: authenticate → upload data → process data → train or load model → predict → show result</text>
</svg>
